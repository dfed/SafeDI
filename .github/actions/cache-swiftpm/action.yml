name: Cache SwiftPM
description: Cache the SwiftPM artifact bundle and dependency cache to avoid re-downloading on every CI run.

inputs:
  key-suffix:
    description: Optional suffix appended to the cache key to scope the cache to a specific job.
    default: ''

runs:
  using: composite
  steps:
    - name: Cache SwiftPM
      uses: actions/cache@v5
      with:
        path: |
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/org.swift.swiftpm
          ~/.cache/org.swift.swiftpm
        key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'CLI/Package.swift') }}${{ inputs.key-suffix && format('-{0}', inputs.key-suffix) || '' }}
        restore-keys: |
          ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'CLI/Package.swift') }}-
          ${{ runner.os }}-spm-
