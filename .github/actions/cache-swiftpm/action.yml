name: Cache SwiftPM
description: Cache the SwiftPM artifact bundle and dependency cache to avoid re-downloading on every CI run.

inputs:
  key-suffix:
    description: Optional suffix appended to the cache key to further scope the cache (in addition to the per-job scope).
    default: ''

runs:
  using: composite
  steps:
    - name: Cache SwiftPM
      uses: actions/cache@v5
      with:
        path: |
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/org.swift.swiftpm
          ~/.cache/org.swift.swiftpm
        # Each job resolves a different Package.swift (root vs. the various
        # Examples/* integrations), so keying solely on OS + manifest hashes
        # would let the first job to save poison the shared cache for every
        # other job — leaving them with an exact-key hit they cannot update.
        # Scope by `github.job` so each job owns its own cache entry.
        # Hash every manifest CI resolves against (root, CLI, all Examples
        # Package.swift, and the Xcode project files used by the Examples
        # integrations) so changing any of them rotates the key — otherwise
        # an unhashed manifest change leaves the workflow on a stale exact hit
        # that it cannot update.
        key: ${{ runner.os }}-spm-${{ github.job }}-${{ hashFiles('**/Package.swift', '**/*.xcodeproj/project.pbxproj') }}${{ inputs.key-suffix && format('-{0}', inputs.key-suffix) || '' }}
        restore-keys: |
          ${{ runner.os }}-spm-${{ github.job }}-${{ hashFiles('**/Package.swift', '**/*.xcodeproj/project.pbxproj') }}-
          ${{ runner.os }}-spm-${{ github.job }}-
