name: Retry
description: Run a command with retries and exponential backoff between attempts.

inputs:
  command:
    description: The command to run.
    required: true
  attempts:
    description: Maximum number of attempts.
    default: '6'
  delay:
    description: Initial seconds to wait between retries. Doubles after each failure, capped at max-delay.
    default: '15'
  max-delay:
    description: Maximum seconds to wait between retries.
    default: '240'

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        delay=${{ inputs.delay }}
        max_delay=${{ inputs.max-delay }}
        for attempt in $(seq 1 ${{ inputs.attempts }}); do
          ${{ inputs.command }} && break
          if [ $attempt -lt ${{ inputs.attempts }} ]; then
            echo "Attempt $attempt failed, retrying in ${delay}s..."
            sleep $delay
            delay=$(( delay * 2 ))
            if [ $delay -gt $max_delay ]; then
              delay=$max_delay
            fi
          else
            echo "All ${{ inputs.attempts }} attempts failed"
            exit 1
          fi
        done
